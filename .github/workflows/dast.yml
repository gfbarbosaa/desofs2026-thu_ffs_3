name: dast

on:
  # Manual trigger against any external URL (e.g. staging)
  workflow_dispatch:
    inputs:
      targetUrl:
        description: "Target URL for DAST (e.g., https://staging.example.com)"
        required: true
        type: string

  # Automated scan: spin up the app via Docker Compose and scan it
  workflow_call:
    inputs:
      targetUrl:
        description: "Internal target URL (set automatically by caller)"
        required: false
        type: string
        default: "http://localhost:8080"

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  # ── Option A: scan an already-running external target ─────────────────────
  zap-external:
    name: "DAST · ZAP Baseline (external)"
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ inputs.targetUrl }}
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a -j"
          issue_title: "ZAP DAST Baseline Report"
          fail_action: false

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report-external
          path: |
            report_html.html
            report_json.json

  # ── Option B: spin up full stack locally and scan ─────────────────────────
  zap-docker:
    name: "DAST · ZAP Baseline (docker)"
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci_dast_postgres_pass
      JWT_SIGNING_KEY: CI_DAST_SIGNING_KEY_CHANGE_ME_32_CHARS
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start stack
        run: |
          docker compose up -d --build
          # Wait until API is healthy (max 60s)
          for i in $(seq 1 12); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "API is up"
              break
            fi
            echo "Waiting for API... ($i)"
            sleep 5
          done

      - name: OWASP ZAP Baseline Scan (docker stack)
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:8080"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a -j"
          issue_title: "ZAP DAST Baseline Report"
          fail_action: false

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report-docker
          path: |
            report_html.html
            report_json.json

      - name: Tear down stack
        if: always()
        run: docker compose down -v
